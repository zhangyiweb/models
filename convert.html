<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 链接转 Raw 直链</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 720px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 32px;
    }
    h1 {
      font-size: 1.5rem;
      color: #f0f6fc;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .field { margin-bottom: 20px; }
    input, textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.85rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #58a6ff; }
    textarea {
      resize: vertical;
      min-height: 48px;
      word-break: break-all;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #30363d; }
    button.primary {
      background: #238636;
      border-color: #238636;
      color: #fff;
    }
    button.primary:hover { background: #2ea043; }
    .error {
      color: #f85149;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }
    .error.show { display: block; }
    .hint {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #30363d;
      font-size: 0.8rem;
      color: #8b949e;
      line-height: 1.6;
    }
    .hint code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GitHub 链接 → Raw 直链</h1>
    <p class="subtitle">粘贴 GitHub 文件页面链接，自动转换为可加载的直链地址</p>

    <div class="field">
      <label for="input">GitHub 页面链接（blob）</label>
      <input
        id="input"
        type="text"
        placeholder="https://github.com/zhangyiweb/models/blob/main/猴头/houtou.glb"
        spellcheck="false"
      >
      <p class="error" id="error">无法识别该链接，请确认是 github.com/.../blob/... 格式</p>
    </div>

    <div class="actions">
      <button class="primary" id="convertBtn">转换</button>
      <button id="copyBtn" disabled>复制直链</button>
      <button id="clearBtn">清空</button>
    </div>

    <div class="field">
      <label for="output">Raw 直链</label>
      <textarea id="output" readonly rows="2" placeholder="转换结果将显示在这里"></textarea>
    </div>

    <div class="hint">
      转换规则：<code>github.com/{用户}/{仓库}/blob/{分支}/{路径}</code>
      → <code>raw.githubusercontent.com/{用户}/{仓库}/{分支}/{路径}</code>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const error = document.getElementById('error');
    const copyBtn = document.getElementById('copyBtn');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');

    function convert(url) {
      const trimmed = url.trim();
      if (!trimmed) return '';

      const match = trimmed.match(
        /^https?:\/\/(?:www\.)?github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/
      );

      if (!match) return null;

      const [, user, repo, branch, path] = match;
      return `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${path}`;
    }

    function doConvert() {
      const result = convert(input.value);

      if (input.value.trim() && result === null) {
        error.classList.add('show');
        output.value = '';
        copyBtn.disabled = true;
        return;
      }

      error.classList.remove('show');
      output.value = result;
      copyBtn.disabled = !result;
    }

    input.addEventListener('input', doConvert);
    input.addEventListener('paste', () => setTimeout(doConvert, 0));
    convertBtn.addEventListener('click', doConvert);

    copyBtn.addEventListener('click', async () => {
      if (!output.value) return;
      await navigator.clipboard.writeText(output.value);
      const original = copyBtn.textContent;
      copyBtn.textContent = '已复制！';
      setTimeout(() => { copyBtn.textContent = original; }, 1500);
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      output.value = '';
      error.classList.remove('show');
      copyBtn.disabled = true;
      input.focus();
    });
  </script>
</body>
</html>
